<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phoenik Admin Panel</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Inter, sans-serif;
            background: #050507;
            color: #E5E7EB;
            min-height: 100vh;
        }
        .login-screen {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .login-box {
            background: #0B0B0F;
            border: 1px solid #1E1E26;
            border-radius: 16px;
            padding: 40px;
            width: 380px;
        }
        .login-box h2 {
            color: #fff;
            font-size: 24px;
            margin-bottom: 8px;
            font-weight: 800;
        }
        .login-box p {
            color: #666;
            font-size: 13px;
            margin-bottom: 24px;
        }
        .login-box input {
            width: 100%;
            padding: 12px 14px;
            background: #0D0D14;
            border: 1px solid #1E1E26;
            border-radius: 8px;
            color: #E5E7EB;
            font-size: 14px;
            outline: none;
            margin-bottom: 14px;
        }
        .login-box input:focus { border-color: #FF3B3B; }
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.2s;
        }
        .btn-primary {
            background: #FF3B3B;
            color: #fff;
            width: 100%;
            padding: 12px;
        }
        .btn-primary:hover { background: #e03030; }
        .btn-sm { padding: 6px 14px; font-size: 12px; }
        .btn-danger { background: #FF4B4B; color: #fff; }
        .btn-danger:hover { background: #e04040; }
        .btn-blue { background: #00A2FF; color: #fff; }
        .btn-blue:hover { background: #0090e0; }
        .btn-green { background: #00ff88; color: #050507; }
        .btn-green:hover { background: #00e07a; }
        .btn-outline {
            background: transparent;
            border: 1px solid #1E1E26;
            color: #E5E7EB;
        }
        .btn-outline:hover { background: #151520; }

        .dashboard { display: none; }
        .dashboard.active { display: flex; min-height: 100vh; }
        .sidebar {
            width: 220px;
            background: #08080A;
            border-right: 1px solid #1E1E26;
            padding: 24px 0;
            flex-shrink: 0;
        }
        .sidebar h1 {
            color: #fff;
            font-size: 16px;
            font-weight: 800;
            padding: 0 20px;
            margin-bottom: 30px;
            letter-spacing: 2px;
        }
        .sidebar .nav-item {
            padding: 10px 20px;
            color: #666;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.15s;
            border-left: 3px solid transparent;
        }
        .sidebar .nav-item:hover { color: #aaa; background: #0D0D14; }
        .sidebar .nav-item.active {
            color: #FF3B3B;
            border-left-color: #FF3B3B;
            background: #0D0D14;
        }
        .main { flex: 1; padding: 30px; overflow-y: auto; }
        .main h2 {
            color: #fff;
            font-size: 22px;
            font-weight: 800;
            margin-bottom: 20px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 14px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: #0F0F15;
            border: 1px solid #1E1E26;
            border-radius: 12px;
            padding: 18px;
        }
        .stat-card .label { color: #666; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
        .stat-card .value { color: #fff; font-size: 26px; font-weight: 800; }
        .stat-card .value.green { color: #00ff88; }
        .stat-card .value.red { color: #FF4B4B; }
        .stat-card .value.blue { color: #00A2FF; }

        .section { display: none; }
        .section.active { display: block; }

        .gen-form {
            background: #0F0F15;
            border: 1px solid #1E1E26;
            border-radius: 14px;
            padding: 24px;
            margin-bottom: 20px;
        }
        .gen-form label {
            display: block;
            color: #666;
            font-size: 12px;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .gen-form input, .gen-form select {
            width: 100%;
            padding: 10px 12px;
            background: #0A0A0E;
            border: 1px solid #1E1E26;
            border-radius: 8px;
            color: #E5E7EB;
            font-size: 13px;
            outline: none;
            margin-bottom: 14px;
        }
        .gen-form input:focus, .gen-form select:focus { border-color: #FF3B3B; }
        .form-row { display: flex; gap: 14px; }
        .form-row > div { flex: 1; }

        table {
            width: 100%;
            border-collapse: collapse;
            background: #0F0F15;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #1E1E26;
        }
        th {
            background: #0A0A0E;
            color: #666;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 12px 16px;
            text-align: left;
        }
        td {
            padding: 10px 16px;
            font-size: 13px;
            border-top: 1px solid #1E1E26;
        }
        tr:hover td { background: #12121A; }
        .badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 10px;
            font-size: 11px;
            font-weight: 600;
        }
        .badge-active { background: #0D3322; color: #00ff88; }
        .badge-expired { background: #331515; color: #FF4B4B; }
        .badge-revoked { background: #333015; color: #ffaa00; }
        .badge-premium { background: #152033; color: #00A2FF; }
        .badge-free { background: #1a1a24; color: #888; }
        .badge-lifetime { background: #2a1533; color: #c870ff; }

        .key-output {
            background: #0A0A0E;
            border: 1px solid #1E1E26;
            border-radius: 8px;
            padding: 14px;
            margin-top: 10px;
            font-family: 'Consolas', monospace;
            font-size: 13px;
            color: #00ff88;
            max-height: 200px;
            overflow-y: auto;
            white-space: pre-line;
            display: none;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #0F0F15;
            border: 1px solid #FF3B3B;
            border-radius: 10px;
            padding: 14px 20px;
            color: #fff;
            font-size: 13px;
            z-index: 1000;
            animation: slideIn 0.3s ease;
            display: none;
        }
        @keyframes slideIn { from { transform: translateX(100px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        .actions { display: flex; gap: 6px; }
        .hidden { display: none !important; }
        .pagination { display: flex; gap: 8px; margin-top: 16px; justify-content: center; }
        .pagination button { min-width: 36px; }
    </style>
</head>
<body>
    <!-- LOGIN -->
    <div class="login-screen" id="loginScreen">
        <div class="login-box">
            <h2>PHOENIK</h2>
            <p>Admin Panel Access</p>
            <input type="password" id="loginPassword" placeholder="Enter admin password" onkeydown="if(event.key==='Enter')doLogin()">
            <button class="btn btn-primary" onclick="doLogin()">Login</button>
            <div id="loginError" style="color:#FF4B4B;font-size:12px;margin-top:10px;display:none"></div>
        </div>
    </div>

    <!-- DASHBOARD -->
    <div class="dashboard" id="dashboard">
        <div class="sidebar">
            <h1>PHOENIK</h1>
            <div class="nav-item active" onclick="showSection('overview')">Overview</div>
            <div class="nav-item" onclick="showSection('generate')">Generate Keys</div>
            <div class="nav-item" onclick="showSection('keys')">All Keys</div>
            <div class="nav-item" onclick="showSection('logout')" style="margin-top:40px;color:#FF4B4B">Logout</div>
        </div>
        <div class="main">
            <!-- OVERVIEW -->
            <div class="section active" id="sec-overview">
                <h2>Dashboard</h2>
                <div class="stats-grid" id="statsGrid"></div>
            </div>

            <!-- GENERATE -->
            <div class="section" id="sec-generate">
                <h2>Generate Keys</h2>
                <div class="gen-form">
                    <div class="form-row">
                        <div>
                            <label>Key Type</label>
                            <select id="genType">
                                <option value="free">Free (24h)</option>
                                <option value="premium">Premium</option>
                                <option value="lifetime">Lifetime</option>
                            </select>
                        </div>
                        <div>
                            <label>Duration (hours)</label>
                            <input type="number" id="genDuration" value="24" min="1">
                        </div>
                        <div>
                            <label>How many</label>
                            <input type="number" id="genCount" value="1" min="1" max="50">
                        </div>
                    </div>
                    <button class="btn btn-primary" style="width:auto" onclick="generateKeys()">Generate</button>
                </div>
                <div class="key-output" id="genOutput"></div>
            </div>

            <!-- KEYS -->
            <div class="section" id="sec-keys">
                <h2>All Keys</h2>
                <div style="display:flex;gap:8px;margin-bottom:16px">
                    <button class="btn btn-sm btn-outline" onclick="loadKeys('all')">All</button>
                    <button class="btn btn-sm btn-outline" onclick="loadKeys('active')">Active</button>
                    <button class="btn btn-sm btn-outline" onclick="loadKeys('expired')">Expired</button>
                    <button class="btn btn-sm btn-outline" onclick="loadKeys('revoked')">Revoked</button>
                    <button class="btn btn-sm btn-outline" onclick="loadKeys('bound')">Bound</button>
                </div>
                <div id="keysTable"></div>
                <div class="pagination" id="pagination"></div>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        let token = localStorage.getItem('phoenik_admin_token');
        let currentPage = 1;

        if (token) {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('dashboard').classList.add('active');
            loadStats();
        }

        async function doLogin() {
            const password = document.getElementById('loginPassword').value;
            try {
                const res = await fetch('/api/admin/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password })
                });
                const data = await res.json();
                if (data.token) {
                    token = data.token;
                    localStorage.setItem('phoenik_admin_token', token);
                    document.getElementById('loginScreen').style.display = 'none';
                    document.getElementById('dashboard').classList.add('active');
                    loadStats();
                } else {
                    document.getElementById('loginError').textContent = data.error || 'Login failed';
                    document.getElementById('loginError').style.display = 'block';
                }
            } catch {
                document.getElementById('loginError').textContent = 'Connection error';
                document.getElementById('loginError').style.display = 'block';
            }
        }

        function showSection(name) {
            if (name === 'logout') {
                localStorage.removeItem('phoenik_admin_token');
                location.reload();
                return;
            }
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('sec-' + name).classList.add('active');
            event.target.classList.add('active');

            if (name === 'overview') loadStats();
            if (name === 'keys') loadKeys('all');
        }

        async function apiCall(url, options = {}) {
            options.headers = { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token, ...options.headers };
            const res = await fetch(url, options);
            if (res.status === 401) { localStorage.removeItem('phoenik_admin_token'); location.reload(); }
            return res.json();
        }

        async function loadStats() {
            const stats = await apiCall('/api/admin/stats');
            document.getElementById('statsGrid').innerHTML = `
                <div class="stat-card"><div class="label">Total Keys</div><div class="value">${stats.total}</div></div>
                <div class="stat-card"><div class="label">Active</div><div class="value green">${stats.active}</div></div>
                <div class="stat-card"><div class="label">Expired</div><div class="value red">${stats.expired}</div></div>
                <div class="stat-card"><div class="label">Revoked</div><div class="value">${stats.revoked}</div></div>
                <div class="stat-card"><div class="label">HWID Bound</div><div class="value blue">${stats.bound}</div></div>
                <div class="stat-card"><div class="label">Free</div><div class="value">${stats.free}</div></div>
                <div class="stat-card"><div class="label">Premium</div><div class="value blue">${stats.premium}</div></div>
            `;
        }

        async function generateKeys() {
            const type = document.getElementById('genType').value;
            const duration = parseInt(document.getElementById('genDuration').value);
            const count = parseInt(document.getElementById('genCount').value);

            const data = await apiCall('/api/admin/generate', {
                method: 'POST',
                body: JSON.stringify({ type, duration, count })
            });

            if (data.keys) {
                const output = document.getElementById('genOutput');
                output.style.display = 'block';
                output.textContent = data.keys.map(k => `${k.key}  [${k.type}]  [${k.duration}]`).join('\n');
                showToast(`Generated ${data.keys.length} key(s)`);
            }
        }

        async function loadKeys(status, page = 1) {
            currentPage = page;
            const data = await apiCall(`/api/admin/keys?status=${status}&page=${page}&limit=20`);

            if (!data.keys) return;

            let html = `<table><thead><tr><th>Key</th><th>Type</th><th>Status</th><th>HWID (PC)</th><th>HWID (Discord)</th><th>Expires</th><th>Actions</th></tr></thead><tbody>`;

            for (const k of data.keys) {
                const isExpired = Date.now() > k.expiry;
                const statusBadge = k.revoked ? '<span class="badge badge-revoked">Revoked</span>'
                    : isExpired ? '<span class="badge badge-expired">Expired</span>'
                    : '<span class="badge badge-active">Active</span>';
                const typeBadge = k.type === 'premium' ? '<span class="badge badge-premium">Premium</span>'
                    : k.type === 'lifetime' ? '<span class="badge badge-lifetime">Lifetime</span>'
                    : '<span class="badge badge-free">Free</span>';
                const hwid = k.hwid ? k.hwid.substring(0, 12) + '...' : '<span style="color:#444">None</span>';
                const hwidDiscord = k.hwidDiscord ? k.hwidDiscord.substring(0, 12) + '...' : '<span style="color:#444">None</span>';
                const expires = new Date(k.expiry).toLocaleString();

                html += `<tr>
                    <td style="font-family:Consolas;font-size:12px">${k.key}</td>
                    <td>${typeBadge}</td>
                    <td>${statusBadge}</td>
                    <td style="font-family:Consolas;font-size:11px" title="${k.hwid || ''}">${hwid}</td>
                    <td style="font-family:Consolas;font-size:11px" title="${k.hwidDiscord || ''}">${hwidDiscord}</td>
                    <td style="font-size:12px">${expires}</td>
                    <td class="actions">
                        <button class="btn btn-sm btn-outline" onclick="copyKey('${k.key}')" title="Copy">Copy</button>
                        ${k.hwid ? `<button class="btn btn-sm btn-blue" onclick="unbindKey('${k.key}', 'executor')" title="Unbind Executor HWID">Unbind PC</button>` : ''}
                        ${k.hwidDiscord ? `<button class="btn btn-sm btn-blue" onclick="unbindKey('${k.key}', 'discord')" title="Unbind Discord HWID">Unbind DC</button>` : ''}
                        ${!k.revoked ? `<button class="btn btn-sm btn-danger" onclick="revokeKey('${k.key}')" title="Revoke">Revoke</button>` : ''}
                        <button class="btn btn-sm btn-danger" onclick="deleteKey('${k.key}')" title="Delete">Del</button>
                    </td>
                </tr>`;
            }
            html += '</tbody></table>';

            document.getElementById('keysTable').innerHTML = html;

            // Pagination
            if (data.pages > 1) {
                let pag = '';
                for (let i = 1; i <= data.pages; i++) {
                    pag += `<button class="btn btn-sm ${i === page ? 'btn-primary' : 'btn-outline'}" onclick="loadKeys('${status}',${i})">${i}</button>`;
                }
                document.getElementById('pagination').innerHTML = pag;
            } else {
                document.getElementById('pagination').innerHTML = '';
            }
        }

        async function revokeKey(key) {
            if (!confirm('Revoke ' + key + '?')) return;
            await apiCall('/api/admin/revoke', { method: 'POST', body: JSON.stringify({ key }) });
            showToast('Key revoked');
            loadKeys('all', currentPage);
        }

        async function unbindKey(key, type) {
            const typeLabel = type === 'discord' ? 'Discord' : 'Executor';
            if (!confirm(`Unbind ${typeLabel} HWID for ${key}?`)) return;
            await apiCall('/api/admin/unbind', { method: 'POST', body: JSON.stringify({ key, type }) });
            showToast(`${typeLabel} HWID unbound`);
            loadKeys('all', currentPage);
        }

        async function deleteKey(key) {
            if (!confirm('DELETE ' + key + '? This is permanent.')) return;
            await apiCall('/api/admin/keys/' + key, { method: 'DELETE' });
            showToast('Key deleted');
            loadKeys('all', currentPage);
        }

        function copyKey(key) {
            navigator.clipboard.writeText(key);
            showToast('Copied: ' + key);
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 3000);
        }
    </script>
</body>
</html>
